<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TriSense — Misleading Text Detector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>TriSense</h1>
    <p class="subtitle">Detect misleading headlines using similarity, emotion & category analysis</p>

    <div class="input-area">
      <label for="headline">Headline</label>
      <textarea id="headline" placeholder="Enter headline here..."></textarea>

      <label for="article">Article / Body</label>
      <textarea id="article" placeholder="Enter article text here..."></textarea>

      <button id="analyzeBtn">Analyze</button>
    </div>

    <div id="output" class="output">
      <!-- Results will be injected here -->
    </div>

    <footer>
      <small>TriSense — Demo. Outputs are probabilistic and for research/demo only.</small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
